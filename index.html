    .animate-slide-in  { animation: slideInLeft  0.3s ease forwards; }

<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-presets="react" data-plugins="transform-nullish-coalescing-operator,transform-optional-chaining">
    const { useState, useMemo, useEffect, useRef } = React;

    /* ================================================================
       UTILS  (from utils.ts — full covariance-matrix implementation)
    ================================================================ */
    function cn(...inputs) {
      return inputs.filter(Boolean).join(' ');
    }

    function calculateStandardDeviation(values) {
      if (values.length === 0) return 0;
      const mean = values.reduce((a, b) => a + b, 0) / values.length;
      const variance = values.reduce((sum, v) => sum + Math.pow(v - mean, 2), 0) / values.length;
      return Math.sqrt(variance);
    }

    function calculateCorrelation(a, b) {
      const n = Math.min(a.length, b.length);
      if (n === 0) return 0;
      const meanA = a.slice(0, n).reduce((s, v) => s + v, 0) / n;
      const meanB = b.slice(0, n).reduce((s, v) => s + v, 0) / n;
      let num = 0, denomA = 0, denomB = 0;
      for (let i = 0; i < n; i++) {
        const da = a[i] - meanA, db = b[i] - meanB;
        num += da * db; denomA += da * da; denomB += db * db;
      }
      const denom = Math.sqrt(denomA * denomB);
      return denom === 0 ? 0 : num / denom;
    }

    // Full covariance-matrix portfolio risk (from utils.ts)
    function calculatePortfolioRisk(assetReturns, weights) {
      const n = assetReturns.length;
      if (n === 0) return 0;
      const stds = assetReturns.map(r => calculateStandardDeviation(r));
      let variance = 0;
      for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
          const corr = i === j ? 1 : calculateCorrelation(assetReturns[i], assetReturns[j]);
          variance += weights[i] * weights[j] * stds[i] * stds[j] * corr;
        }
      }
      return Math.sqrt(Math.max(0, variance));
    }

    // Rich correlation insight (from utils.ts)
    function getCorrelationInsight(symbolA, symbolB, r) {
      const abs = Math.abs(r);
      const direction = r > 0 ? 'tend to move in the same direction' : 'tend to move in opposite directions';
      if (abs > 0.9) return `${symbolA} and ${symbolB} are highly synchronised — they ${direction}. Holding both offers little diversification.`;
      if (abs > 0.7) return `${symbolA} and ${symbolB} are strongly correlated and ${direction} most of the time. Consider reducing overlap.`;
      if (abs > 0.4) return `${symbolA} and ${symbolB} share a moderate relationship and ${direction} more often than not.`;
      if (abs > 0.2) return `${symbolA} and ${symbolB} have a weak link — they ${direction} only occasionally.`;
      return `${symbolA} and ${symbolB} are largely independent. Holding both genuinely diversifies your portfolio.`;
    }

    // Rich portfolio insights (from utils.ts)
    function generatePortfolioInsights(assets) {
      const insights = [];
      if (assets.length < 2) return ['Add more assets to unlock portfolio insights.'];
      const totalWeight = assets.reduce((s, a) => s + a.weight, 0) || 1;
      const normalizedWeights = assets.map(a => a.weight / totalWeight);
      const maxWeight = Math.max(...normalizedWeights);
      if (maxWeight > 0.5) {
        const heaviest = assets[normalizedWeights.indexOf(maxWeight)];
        insights.push(`⚠️ ${heaviest.symbol} makes up over 50% of your portfolio — consider rebalancing.`);
      }
      let totalCorr = 0, pairs = 0;
      for (let i = 0; i < assets.length; i++)
        for (let j = i + 1; j < assets.length; j++) {
          totalCorr += Math.abs(calculateCorrelation(assets[i].returns, assets[j].returns));
          pairs++;
        }
      const avgCorr = pairs > 0 ? totalCorr / pairs : 0;
      if (avgCorr > 0.75)      insights.push('🔴 Assets are highly correlated — your portfolio may not be well-diversified.');
      else if (avgCorr > 0.5)  insights.push('🟡 Moderate correlation detected. Some diversification benefit exists.');
      else                     insights.push('🟢 Low average correlation — your portfolio benefits from strong diversification.');
      const vols = assets.map(a => calculateStandardDeviation(a.returns));
      const maxVol = Math.max(...vols);
      const highVolAsset = assets[vols.indexOf(maxVol)];
      if (maxVol > 0.025)
        insights.push(`📊 ${highVolAsset.symbol} is the most volatile asset (daily σ ≈ ${(maxVol * 100).toFixed(1)}%).`);
      return insights;
    }

    /* ================================================================
       CONSTANTS  (from constants.ts)
    ================================================================ */
    function CORRELATION_INTERPRETATION(r) {
      const a = Math.abs(r);
      if (a > 0.9) return { description: 'These assets move almost perfectly in sync.' };
      if (a > 0.7) return { description: 'They follow each other closely most of the time.' };
      if (a > 0.4) return { description: 'A noticeable relationship, but they often diverge.' };
      if (a > 0.2) return { description: 'The relationship is slight and unreliable.' };
      return { description: 'These assets move independently of each other.' };
    }

    // Price-path simulation (from constants.ts — more realistic than the original)
    function generateMockReturns(drift, volatility, days) {
      const returns = [];
      let price = 100;
      for (let i = 0; i < days; i++) {
        const dailyReturn = drift + volatility * (Math.random() - 0.5) * 2;
        price *= (1 + dailyReturn);
        returns.push(dailyReturn);
      }
      return returns;
    }

    const INITIAL_ASSETS = [
      { id: '1', symbol: 'AAPL',  name: 'Apple Inc.',    color: '#60a5fa', weight: 0.25, returns: generateMockReturns(0.0005, 0.015, 60) },
      { id: '2', symbol: 'GOOGL', name: 'Alphabet Inc.', color: '#f87171', weight: 0.25, returns: generateMockReturns(0.0004, 0.014, 60) },
      { id: '3', symbol: 'TSLA',  name: 'Tesla, Inc.',   color: '#fbbf24', weight: 0.25, returns: generateMockReturns(0.0008, 0.030, 60) },
      { id: '4', symbol: 'BTC',   name: 'Bitcoin',       color: '#f59e0b', weight: 0.25, returns: generateMockReturns(0.0010, 0.040, 60) },
    ];

    /* ================================================================
       SVG ICON COMPONENTS
    ================================================================ */

    }

    const LightbulbIcon     = ({className:c}) => <SvgIcon cls={c}><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></SvgIcon>;

    const ZapIcon           = ({className:c}) => <SvgIcon cls={c}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></SvgIcon>;

    const PieChartIcon      = ({className:c}) => <SvgIcon cls={c}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></SvgIcon>;
    const BarChart2Icon     = ({className:c}) => <SvgIcon cls={c}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></SvgIcon>;
    const AlertTriangleIcon = ({className:c}) => <SvgIcon cls={c}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></SvgIcon>;

    /* ================================================================
       RISK METER
    ================================================================ */
    function RiskMeter({ risk }) {
      const pct = Math.min(Math.max((risk * 100) / 4, 0), 1) * 100;
      let label = 'Low Risk', bar = '#10b981', txt = '#6ee7b7';
      if      (risk > 0.03)  { label = 'High Risk';   bar = '#ef4444'; txt = '#fca5a5'; }
      else if (risk > 0.015) { label = 'Medium Risk'; bar = '#f59e0b'; txt = '#fcd34d'; }
      return (
        <div>
          <div className="flex justify-between items-end mb-2">
            <span className="text-[11px] font-bold uppercase tracking-widest" style={{color: txt}}>{label}</span>
            <span className="text-3xl font-black text-white">{(risk * 100).toFixed(2)}%</span>
          </div>
          <div className="h-2.5 rounded-full overflow-hidden mb-1.5" style={{background: 'rgba(255,255,255,0.1)'}}>
            <div className="h-full rounded-full transition-all duration-500" style={{width: `${pct}%`, backgroundColor: bar}} />
          </div>
          <div className="flex justify-between text-[10px] text-slate-500">
            <span>0%</span><span>Daily Std Dev</span><span>4%+</span>
          </div>
        </div>
      );
    }

    /* ================================================================
       CORRELATION MATRIX  (D3)
    ================================================================ */
    function CorrelationMatrix({ assets, onCellHover }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current || !assets.length) return;
        const mg = { top: 60, right: 20, bottom: 20, left: 60 };
        const W = 380 - mg.left - mg.right;
        const H = 380 - mg.top  - mg.bottom;
        d3.select(ref.current).selectAll('*').remove();
        const svg = d3.select(ref.current)
          .attr('width',  W + mg.left + mg.right)
          .attr('height', H + mg.top  + mg.bottom)
          .append('g').attr('transform', `translate(${mg.left},${mg.top})`);

        const labels = assets.map(a => a.symbol);
        const x   = d3.scaleBand().range([0, W]).domain(labels).padding(0.06);
        const y   = d3.scaleBand().range([0, H]).domain(labels).padding(0.06);
        const col = d3.scaleLinear().domain([-1, 0, 1]).range(['#ef4444', '#f8fafc', '#3b82f6']);

        const data = [];
        assets.forEach(a1 => assets.forEach(a2 =>
          data.push({ x: a1.symbol, y: a2.symbol, r: calculateCorrelation(a1.returns, a2.returns), a1, a2 })
        ));

        svg.selectAll('rect').data(data).enter().append('rect')
          .attr('x', d => x(d.x) ?? 0).attr('y', d => y(d.y) ?? 0)
          .attr('rx', 5).attr('ry', 5)
          .attr('width', x.bandwidth()).attr('height', y.bandwidth())
          .style('fill', d => col(d.r)).style('stroke', '#e2e8f0').style('stroke-width', 1)
          .on('mouseover', function(ev, d) {
            d3.select(this).style('stroke', '#1e293b').style('stroke-width', 2.5);
            onCellHover(d.a1, d.a2, d.r);
          })
          .on('mouseleave', function() {
            d3.select(this).style('stroke', '#e2e8f0').style('stroke-width', 1);
            onCellHover(null, null, null);
          });

        svg.selectAll('text.val').data(data).enter().append('text')
          .attr('x', d => (x(d.x) ?? 0) + x.bandwidth() / 2)
          .attr('y', d => (y(d.y) ?? 0) + y.bandwidth() / 2)
          .attr('dy', '.35em').attr('text-anchor', 'middle')
          .text(d => `${Math.round(d.r * 100)}%`)
          .style('font-size', '10px').style('font-weight', '700')
          .style('fill', d => Math.abs(d.r) > 0.5 ? '#fff' : '#1e293b')
          .style('pointer-events', 'none');

        svg.append('g').attr('transform', 'translate(0,-10)').selectAll('text')
          .data(labels).enter().append('text')
          .attr('x', d => (x(d) ?? 0) + x.bandwidth() / 2).attr('y', 0)
          .attr('text-anchor', 'middle').text(d => d)
          .style('font-size', '12px').style('font-weight', '700').style('fill', '#64748b');

        svg.append('g').attr('transform', 'translate(-10,0)').selectAll('text')
          .data(labels).enter().append('text')
          .attr('x', 0).attr('y', d => (y(d) ?? 0) + y.bandwidth() / 2)
          .attr('dy', '.35em').attr('text-anchor', 'end').text(d => d)
          .style('font-size', '12px').style('font-weight', '700').style('fill', '#64748b');
      }, [assets]);

      return (
        <div className="flex justify-center bg-white p-3 rounded-xl border border-slate-100 overflow-x-auto">
          <svg ref={ref} />
        </div>
      );
    }

    /* ================================================================
       CORRELATION NETWORK  (D3 force)
    ================================================================ */
    function CorrelationNetwork({ assets }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current || !assets.length) return;
        const W = 380, H = 280;
        d3.select(ref.current).selectAll('*').remove();
        const svg = d3.select(ref.current)
          .attr('viewBox', `0 0 ${W} ${H}`).attr('width', '100%').attr('height', H);

        const nodes = assets.map(a => ({ id: a.id, symbol: a.symbol, color: a.color }));
        const links = [];
        for (let i = 0; i < assets.length; i++)
          for (let j = i + 1; j < assets.length; j++) {
            const r = calculateCorrelation(assets[i].returns, assets[j].returns);
            if (Math.abs(r) > 0.25) links.push({ source: assets[i].id, target: assets[j].id, value: r });
          }

        const sim = d3.forceSimulation(nodes)
          .force('link',      d3.forceLink(links).id(d => d.id).distance(90))
          .force('charge',    d3.forceManyBody().strength(-280))
          .force('center',    d3.forceCenter(W / 2, H / 2))
          .force('collision', d3.forceCollide(28));

        const link = svg.append('g').selectAll('line').data(links).join('line')
          .attr('stroke', d => d.value > 0 ? '#3b82f6' : '#ef4444')
          .attr('stroke-opacity', 0.55)
          .attr('stroke-width', d => Math.abs(d.value) * 7);

        const node = svg.append('g').selectAll('g').data(nodes).join('g')
          .call(d3.drag()
            .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
            .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
          );

        node.append('circle').attr('r', 22).attr('fill', d => d.color).attr('stroke', '#fff').attr('stroke-width', 2.5);
        node.append('text').text(d => d.symbol)
          .attr('text-anchor', 'middle').attr('dy', '.35em')
          .attr('fill', '#fff').style('font-size', '10px').style('font-weight', '700').style('pointer-events', 'none');

        sim.on('tick', () => {
          link.attr('x1', d => d.source.x ?? 0).attr('y1', d => d.source.y ?? 0)
              .attr('x2', d => d.target.x ?? 0).attr('y2', d => d.target.y ?? 0);
          node.attr('transform', d => `translate(${d.x ?? 0},${d.y ?? 0})`);
        });
      }, [assets]);

      return (
        <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
          <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Correlation Network</div>
          <svg ref={ref} style={{display: 'block'}} />
          <div className="flex justify-center gap-4 text-[10px] text-slate-400 mt-2">
            <span className="flex items-center gap-1"><span className="inline-block w-3.5 h-0.5 bg-blue-500" />Positive</span>
            <span className="flex items-center gap-1"><span className="inline-block w-3.5 h-0.5 bg-red-500" />Negative</span>
            <span className="italic">Thickness = Strength</span>
          </div>
        </div>
      );
    }

    /* ================================================================
       ANIMATED BAR  (replaces motion.div from AssetContribution.tsx)
    ================================================================ */
    function AnimatedBar({ item, delay }) {
      const [width, setWidth] = useState(0);
      useEffect(() => {
        const t = setTimeout(() => setWidth(item.pct), 50 + delay * 1000);
        return () => clearTimeout(t);
      }, [item.pct, delay]);
      return (
        <div className="animate-slide-in" style={{animationDelay: `${delay}s`}}>
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-2">
              <div className="w-5 h-5 rounded flex items-center justify-center text-[8px] font-bold text-white shadow-sm"
                style={{backgroundColor: item.asset.color}}>{item.asset.symbol[0]}</div>
              <span className="text-xs font-bold text-slate-700">{item.asset.symbol}</span>
            </div>
            <div className="flex items-center gap-3">
              <span className="text-[10px] text-slate-400">vol {item.volatility.toFixed(1)}%</span>
              <span className="text-xs font-black text-slate-800 w-8 text-right">{item.pct}%</span>
            </div>
          </div>
          <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
            <div className="h-full rounded-full transition-all duration-700"
              style={{width: `${width}%`, backgroundColor: item.asset.color}} />
          </div>
        </div>
      );
    }

    /* ================================================================
       ASSET CONTRIBUTION  (from AssetContribution.tsx)
    ================================================================ */
    function AssetContribution({ assets }) {
      const contributions = useMemo(() => {
        const totalWeight = assets.reduce((s, a) => s + a.weight, 0);
        const norm = totalWeight === 0
          ? assets.map(() => 1 / assets.length)
          : assets.map(a => a.weight / totalWeight);

        const baseRisk = calculatePortfolioRisk(assets.map(a => a.returns), norm);

        const marginals = assets.map((asset, i) => {
          const tweakedWeights = norm.map((w, j) => {
            if (j === i) return 0;
            const remaining = norm.reduce((s, ww, jj) => jj !== i ? s + ww : s, 0);
            return remaining === 0 ? 1 / (assets.length - 1) : w / remaining;
          });
          const riskWithout = calculatePortfolioRisk(assets.map(a => a.returns), tweakedWeights);
          const marginal = Math.max(0, baseRisk - riskWithout);
          return { asset, marginal };
        });

        const totalMarginal = marginals.reduce((s, c) => s + c.marginal, 0) || 1;
        return marginals.map(c => ({
          asset:        c.asset,
          contribution: c.marginal / totalMarginal,
          pct:          Math.round((c.marginal / totalMarginal) * 100),
          volatility:   calculateStandardDeviation(c.asset.returns) * 100,
        })).sort((a, b) => b.contribution - a.contribution);
      }, [assets]);

      const top  = contributions[0];
      const top2 = contributions.slice(0, 2);
      const top2pct = top2.reduce((s, c) => s + c.pct, 0);

      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <div className="flex items-center gap-2 mb-5">
            <div className="p-1.5 bg-orange-50 rounded-lg"><PieChartIcon className="text-orange-500 w-4 h-4" /></div>
            <div>
              <h2 className="text-sm font-bold uppercase tracking-tight">Risk Contribution</h2>
              <p className="text-[10px] text-slate-400 font-medium">How much each asset drives portfolio risk</p>
            </div>
          </div>

          <div className="space-y-3">
            {contributions.map((item, i) => (
              <AnimatedBar key={item.asset.id} item={item} delay={i * 0.05} />
            ))}
          </div>

          <div className="mt-5 pt-4 border-t border-slate-100">
            <div className="flex items-start gap-2 p-3 bg-orange-50 rounded-xl border border-orange-100">
              <BarChart2Icon className="w-3.5 h-3.5 text-orange-500 mt-0.5 shrink-0" />

    function computePortfolioStats(assets, weights) {
      const valid = assets.filter(a => weights[a.symbol] !== undefined);
      if (!valid.length) return { risk: 0, avgReturn: 0, diversificationScore: 0, sharpe: 0 };
      const totalW  = Object.values(weights).reduce((s, w) => s + w, 0) || 1;
      const norm    = valid.map(a => (weights[a.symbol] || 0) / totalW);
      const risk    = calculatePortfolioRisk(valid.map(a => a.returns), norm);
      const avgRet  = valid.reduce((s, a, i) =>
        s + (a.returns.reduce((x, y) => x + y, 0) / a.returns.length) * norm[i], 0) * 252;
      let totalCorr = 0, pairs = 0;
      for (let i = 0; i < valid.length; i++)
        for (let j = i + 1; j < valid.length; j++) {
          totalCorr += Math.abs(calculateCorrelation(valid[i].returns, valid[j].returns));
          pairs++;
        }
      const divScore = Math.round((1 - (pairs > 0 ? totalCorr / pairs : 0)) * 100);
      const annRisk  = risk * Math.sqrt(252);
      return {
        risk:                annRisk * 100,
        avgReturn:           avgRet  * 100,
        diversificationScore: divScore,
        sharpe:              annRisk > 0 ? (avgRet - 0.04) / annRisk : 0,
      };
    }

    function PortfolioComparison({ currentAssets, currentWeights }) {

        { label: 'Exp. Return',     a: (sA.avgReturn > 0 ? '+' : '') + sA.avgReturn.toFixed(1) + '%', b: (sB.avgReturn > 0 ? '+' : '') + sB.avgReturn.toFixed(1) + '%', better: sA.avgReturn > sB.avgReturn ? 'A' : sB.avgReturn > sA.avgReturn ? 'B' : null },
        { label: 'Diversification', a: sA.diversificationScore + '/100', b: sB.diversificationScore + '/100', better: sA.diversificationScore > sB.diversificationScore ? 'A' : sB.diversificationScore > sA.diversificationScore ? 'B' : null },
        { label: 'Sharpe Ratio',    a: sA.sharpe.toFixed(2),       b: sB.sharpe.toFixed(2),      better: sA.sharpe > sB.sharpe ? 'A' : sB.sharpe > sA.sharpe ? 'B' : null },

                  {m.better === 'B' && <div className="text-[8px] text-indigo-500 font-bold">✓ better</div>}

              <CorrelationNetwork assets={assets} />
            </div>

            {/* Right column — tab content */}
            <div className="lg:col-span-8 space-y-6">

              {/* ── OVERVIEW TAB ── */}
              {activeTab === 'overview' && (
                <div className="space-y-6 animate-enter">

                  {/* Heatmap */}
                  <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div className="mb-6">
                      <h2 className="text-lg font-semibold">Correlation Heatmap</h2>
                      <p className="text-sm text-slate-500">Hover to see automated explanations</p>
                    </div>
                    <div className="grid grid-cols-1 xl:grid-cols-5 gap-8 items-start">
                      <div className="xl:col-span-3">
                        <CorrelationMatrix assets={assets} onCellHover={(a1,a2,r) => setHovered({a1,a2,r})} />
                      </div>
                      <div className="xl:col-span-2">
                        {hovered.a1 && hovered.a2 && hovered.r !== null ? (
                          <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 animate-enter">
                            <div className="flex items-center gap-3 mb-4">
                              <div className="flex -space-x-2">
                                <div className="w-8 h-8 rounded-full border-2 border-white shadow-sm flex items-center justify-center text-[10px] font-bold text-white"
                                  style={{backgroundColor: hovered.a1.color}}>{hovered.a1.symbol[0]}</div>
                                <div className="w-8 h-8 rounded-full border-2 border-white shadow-sm flex items-center justify-center text-[10px] font-bold text-white"
                                  style={{backgroundColor: hovered.a2.color}}>{hovered.a2.symbol[0]}</div>
                              </div>
                              <div className="text-xs font-bold text-slate-500 uppercase tracking-tight">
                                {hovered.a1.symbol} + {hovered.a2.symbol}
                              </div>
                            </div>
                            <div className="mb-4">
                              <div className="text-3xl font-black text-slate-900">{Math.round(hovered.r * 100)}%</div>
                              <div className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Correlation Strength</div>
                            </div>
                            <div className="space-y-3">
                              <div className="p-3 bg-white rounded-xl border border-slate-200 shadow-sm">
                                <div className="flex items-center gap-2 text-blue-600 mb-1">
                                  <InfoIcon className="w-3 h-3" />
                                  <span className="text-[10px] font-bold uppercase">Interpretation</span>
                                </div>
                                <p className="text-xs text-slate-700 font-medium leading-relaxed">
                                  {CORRELATION_INTERPRETATION(hovered.r).description}
                                </p>
                              </div>
                              <div className="p-3 bg-blue-600 rounded-xl shadow-md">
                                <div className="flex items-center gap-2 text-white/80 mb-1">
                                  <LightbulbIcon className="w-3 h-3" />
                                  <span className="text-[10px] font-bold uppercase">Auto-Explanation</span>
                                </div>
                                <p className="text-xs text-white font-medium leading-relaxed">
                                  {getCorrelationInsight(hovered.a1.symbol, hovered.a2.symbol, hovered.r)}
                                </p>
                              </div>
                            </div>
                          </div>
                        ) : (
                          <div className="h-full flex flex-col items-center justify-center text-center p-8 border-2 border-dashed border-slate-100 rounded-2xl bg-slate-50/50">
                            <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm mb-4">
                              <ArrowRightIcon className="text-slate-300 w-6 h-6" />
                            </div>
                            <h3 className="text-sm font-bold text-slate-400 uppercase mb-1">Interactive Heatmap</h3>
                            <p className="text-xs text-slate-400 max-w-[180px]">Hover over the matrix to reveal deep asset relationships</p>
                          </div>
                        )}
                      </div>
                    </div>
                  </section>

                  {/* Portfolio Health + AI */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                      <div className="flex items-center gap-2 mb-4">
                        <div className="p-1.5 bg-emerald-50 rounded-lg"><ShieldAlertIcon className="text-emerald-600 w-4 h-4" /></div>
                        <h2 className="text-sm font-bold uppercase tracking-tight">Portfolio Health</h2>
                      </div>
                      <div className="space-y-3">
                        {insights.map((txt, i) => (
                          <div key={i} className="flex items-start gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100">
                            <div className="mt-1 w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0" />
                            <p className="text-xs text-slate-700 font-medium leading-relaxed">{txt}</p>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                      <div className="flex items-center justify-between mb-4">
                        <div className="flex items-center gap-2">
                          <div className="p-1.5 bg-purple-50 rounded-lg"><BrainCircuitIcon className="text-purple-600 w-4 h-4" /></div>
                          <h2 className="text-sm font-bold uppercase tracking-tight">AI Market Context</h2>
                        </div>
                        <button onClick={() => setShowKey(s => !s)}
                          className="text-[9px] text-purple-500 font-bold border border-purple-200 rounded px-1.5 py-0.5 hover:bg-purple-50 transition-colors">
                          {showKey ? 'Hide' : 'API Key'}
                        </button>
                      </div>
                      {showKey && (
                        <div className="mb-3 flex gap-2">
                          <input type="password" placeholder="Paste Gemini API key…"
                            value={apiKey} onChange={e => setApiKey(e.target.value)}
                            className="flex-1 text-xs border border-slate-200 rounded-lg px-2 py-1.5 outline-none focus:border-purple-400" />
                          <button onClick={() => runAI(apiKey)}
                            className="text-xs bg-purple-600 text-white rounded-lg px-3 py-1.5 font-bold hover:bg-purple-700 transition-colors">
                            Run
                          </button>
                        </div>
                      )}
                      <div className={cn('p-4 rounded-xl min-h-[80px] flex flex-col justify-center transition-all',
                        aiLoading ? 'bg-slate-50 animate-pulse' : 'bg-purple-50/30 border border-purple-100')}>
                        {aiLoading ? (
                          <div className="space-y-2">
                            <div className="h-3 bg-slate-200 rounded w-full" />
                            <div className="h-3 bg-slate-200 rounded w-2/3" />
                          </div>
                        ) : (
                          <p className="text-xs text-slate-600 italic leading-relaxed">
                            "{aiText || "Click 'API Key' to enable Gemini AI analysis."}"
                          </p>
                        )}
                        <div className="mt-2 text-[8px] font-bold text-purple-400 uppercase tracking-widest">Powered by Gemini</div>
                      </div>
                    </div>
                  </div>

                  {/* Asset Contribution */}
                  <AssetContribution assets={assets} />
                </div>
              )}

              {/* ── STRESS TEST TAB ── */}
              {activeTab === 'stress' && (
                <div className="animate-enter">
                  <StressTest assets={assets} />
                </div>
              )}

              {/* ── COMPARE TAB ── */}
              {activeTab === 'compare' && (
                <div className="animate-enter">
                  <PortfolioComparison currentAssets={assets} currentWeights={currentWeightsMap} />
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
